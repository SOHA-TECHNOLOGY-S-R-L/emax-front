  @for (item of lstItemPedido(); track $index) {
  <div style="border-bottom: 1px solid #ccc; padding-top: 2px;">
    <div class="d-flex justify-content-between align-items-center">
      <img [src]="item.imagenShow" alt={{item.producto.nombre}} width="48px" />
      <p class="texto-recortado my-0">{{item.producto.nombre | stringToTitleWithAccents}}</p>
       <button id="btnDeleteFromCart" class="btn btn-danger icon-square" title="Eliminar item"
        (click)="eliminarItemPedido(item)">
        <i class="fa-regular fa-trash-can"></i>
      </button>
    </div>
    <div class="row">
      <div class="col-3 d-flex align-items-center">
        {{item.producto.precioMasBajoProductoShow | currency: 'PEN'}}
      </div>
      <div class="col-5 d-flex align-items-center">
        <input type="number" name="cantidad" class="form-control" [step]="item.producto.gruposDe"
          [min]="item.producto.minCantidadPedido" [max]="item.producto.maxCantidadPedido" [value]="item.cantidad"
          (input)="actualizarCantidad(item.producto.id, $event);" />
      </div>
      <div class="col-4 d-flex align-items-center">
        {{item.importe| currency:'PEN'}}
      </div>

    </div>


<!--     <div class="row">
      <div class="d-flex flex-row justify-content-evenly align-items-center">

        </div>

  </div>
  }

  <div class="row">
    <div class="col-6">
      <p class="text-end fw-bold">TOTAL</p>
    </div>
    <div class="col-6">
      <p class="text-center fw-bold">{{total() | currency:'PEN'}}</p>
    </div>
  </div>

  <div class="d-flex flex-wrap flex-column flex-sm-row justify-content-sm-evenly">
    <button (click)=" closeModal(); seguirComprando();" class="btn btn-secondary mb-1 ml-2">Seguir comprando</button>

    <button (click)=" closeModal(); irRealizarPedido();" class="btn btn-primary mb-1 ml-2"
      [disabled]="!(lstItemPedido().length > 0)">Realizar el pedido</button>
  </div>

</div>
