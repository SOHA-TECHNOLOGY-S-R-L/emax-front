<div class="container">
  <div class="row mt-3">
    <autocomplete-resource [placeholder]="'Buscar productos para VENTA'" [searchFn]="buscarProductos"
      [displayWith]="mostrarProducto" (selected)="onProductoSeleccionado($event)">
      <ng-template let-producto>
        <div>
          {{ producto.nombre }}
          <span class="text-bold-italic">Color:</span> {{ findColorById(producto.colorId) }}
          <span class="text-bold-italic">Cant:</span> {{ producto.cantidadStock }} unid
          <span class="text-bold-italic">Cod:</span> {{ producto.codigo }}

        </div>
      </ng-template>
    </autocomplete-resource>
  </div>
  @if(producto()) {

  <div class="example-container" [class.example-is-mobile]="isMobile()">
    <mat-drawer-container autosize class="example-sidenav-container" [style.marginTop.px]="isMobile() ? 56 : 0">
      <mat-drawer-content class="main-sidenav-content">
        <customize-item-producto-to-client (clickVerCarrito)="drawnerRight.open()" [inProducto]="producto()!" />
      </mat-drawer-content>
      <mat-drawer position="end" class="main-drawer" #drawnerRight [mode]="isMobile() ? 'over' : 'side'"
        [opened]="!isMobile()" fixedTopGap="56">
        <carrito-item-producto (clickBuscarProductos)="drawnerRight.close()" /> <!-- 3-VENTA ORIGEN EN TIENDA -->
        <!-- 4-VENTA ORIGEN ONLINE -->
      </mat-drawer>
    </mat-drawer-container>
  </div>
  }
</div>
