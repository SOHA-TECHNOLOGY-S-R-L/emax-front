<div class="container">
  <div class="row mt-3">
    <autocomplete-resource [placeholder]="'Buscar productos para COMPRA'" [searchFn]="buscarProductos"
      [displayWith]="mostrarProducto" (selected)="onProductoToItems($event)">
      <ng-template let-producto>
        <div>
          {{ producto.nombre }}
          <span class="text-bold-italic">Color:</span> {{ findColorById(producto.colorId) }}
          <span class="text-bold-italic">Cant:</span> {{ producto.cantidadStock }} unid
          <span class="text-bold-italic">Cod:</span> {{ producto.codigo }}

        </div>
      </ng-template>
    </autocomplete-resource>
  </div>

  <app-item-pedido [inEnvioPedido]="envioPedido()" [inTipoPedidoId]="PEDIDO_COMPRA" (outItems)="recibirItems($event)" />
  <!--       <pedido-proveedor-finalizado [personaId]="personaId()!" [producto]="producto()!" />
 -->
  <!--   }
 -->
  <div class="row">
    <div class="col-12">
      <textarea class="form-control" name="observacion" [ngStyle]="{ resize: 'none' }" aria-label="With textarea"
        placeholder="Coloca aquí datos adicionales al pedido..." minlength="2" maxlength="250" rows="2"
        (input)="actualizarObservacion($any($event.target).value)"></textarea>
      <!--     @if (formUtils.isValidField(formProducto, "observacion")) {
    <div class="alert alert-danger">
      {{ formUtils.getFieldError(formProducto, "observacion") }}
    </div>
    } -->

    </div>
  </div>
  <div class="row">
    <div class="col-12">
      <ul class="list-group my-1">
        <li class="list-group-item active d-flex justify-content-between">
          <span>Adquirido en fecha:</span>
          <input style="width:220px" type="datetime-local" [value]="fechaAdquirido()"
            (input)="actualizarFecha($any($event.target).value)" name="fechaAdquirido" required>
        </li>
      </ul>
    </div>
  </div>

  <div class="row mb-2">
    @if(items().length > 0){
    <button class="btn btn-dark btn-lg"
      (click)="crearPedidoTienda()">Finalizar COMPRA</button>
    }
  </div>
</div>
