<div class="example-container" [class.example-is-mobile]="isMobile()">
  <mat-sidenav-container class="example-sidenav-container" [style.marginTop.px]="isMobile() ? 56 : 0">
    <mat-sidenav class="main-sidenav" #sidenavLeft [mode]="isMobile() ? 'over' : 'side'"
      [fixedInViewport]="isMobile()" fixedTopGap="56">
      <menu-app (clickMenuEvent)="sidenavLeft.toggle()"></menu-app>
    </mat-sidenav>
    <mat-sidenav-content class="main-sidenav-content">
      <cabecera (clickMenuEvent)="sidenavLeft.toggle()" />
      <router-outlet></router-outlet>
      <loading-overlay></loading-overlay>
      <app-pie></app-pie>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
